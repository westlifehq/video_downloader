<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Downloader</title>
  <meta name="description" content="全平台视频无水印原画下载工具">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- 背景动效 -->
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <main class="container">
    <!-- 头部 -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M34 8H30C30 12.4183 26.4183 16 22 16V20C24.4 20 26.6 19.2 28.4 17.8V30C28.4 34.4183 24.8183 38 20.4 38C15.9817 38 12.4 34.4183 12.4 30C12.4 25.5817 15.9817 22 20.4 22V18C13.7726 18 8.4 23.3726 8.4 30C8.4 36.6274 13.7726 42 20.4 42C27.0274 42 32.4 36.6274 32.4 30V17.6C34.2 19.1 36.4 20 38.8 20V16C36.1 16 34 13.8 34 11V8Z"
            fill="url(#paint0_linear)" />
          <defs>
            <linearGradient id="paint0_linear" x1="8.4" y1="8" x2="40" y2="42" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FE2C55" />
              <stop offset="0.5" stop-color="#25F4EE" />
              <stop offset="1" stop-color="#FE2C55" />
            </linearGradient>
          </defs>
        </svg>
        <h1 class="logo-text">Video Downloader</h1>
      </div>
      <p class="tagline">全平台自由下载 · 无水印 · 原画质</p>
    </header>

    <!-- 输入区域 -->
    <section class="input-section">
      <div class="input-wrapper">
        <textarea id="urlInput" class="url-input" placeholder="粘贴视频链接 (抖音/小红书等)..." autocomplete="off"
          spellcheck="false" rows="1" oninput="handleInputResize(this)"></textarea>
        <button id="clearBtn" class="btn-clear" onclick="clearInput()" title="清空" style="display:none">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <button id="parseBtn" class="btn btn--primary" onclick="handleParse()">
          <span class="btn-text">解析</span>
          <span class="btn-loader" style="display:none"></span>
        </button>
      </div>
      <p class="input-hint">支持抖音、小红书平台的视频链接</p>
    </section>

    <!-- 错误提示 -->
    <div id="errorMsg" class="error-msg" style="display:none"></div>

    <!-- 解析结果列表容器 -->
    <div id="resultsContainer" class="results-container"></div>

    <!-- 历史记录 -->
    <section id="historySection" class="history-section" style="display:none">
      <div class="section-header">
        <h3>下载历史</h3>
        <button class="btn btn--ghost" onclick="clearHistory()">清空</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>

    <!-- 设置面板 -->
    <section class="settings-section">
      <div class="section-header" onclick="toggleSettings()">
        <h3>
          <svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          设置
        </h3>
        <svg class="chevron" id="settingsChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </div>
      <div id="settingsPanel" class="settings-panel" style="display:none">
        <div class="setting-item">
          <label class="setting-label">下载目录</label>
          <div class="setting-input-row">
            <input type="text" id="downloadDir" class="setting-input" placeholder="输入下载目录路径…">
            <button class="btn btn--secondary" onclick="saveConfig()">保存</button>
          </div>
          <p class="setting-hint">视频将保存到此目录，留空则使用默认路径 ~/Downloads/douyin</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>仅供个人学习研究使用</p>
  </footer>

  <script src="app.js"></script>
</body>

</html>
