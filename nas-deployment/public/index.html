<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <div class="bg-glow bg-glow--1"></div>
  <div class="bg-glow bg-glow--2"></div>

  <main class="container">
    <header class="header">
      <h1 class="logo-text">Video Downloader</h1>
      <p class="tagline">无水印 · 原画质 · 全平台</p>
    </header>

    <!-- 链接解析 -->
    <section class="card">
      <div class="input-wrapper">
        <textarea id="urlInput" class="url-input" placeholder="粘贴视频链接（抖音 / 小红书）…" autocomplete="off" spellcheck="false" rows="1" oninput="handleInputResize(this)"></textarea>
        <button id="clearBtn" class="btn-clear" onclick="clearInput()" title="清空" style="display:none">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button id="parseBtn" class="btn btn--primary" onclick="handleParse()">
          <span class="btn-text">解析</span>
          <span class="btn-loader" style="display:none"></span>
        </button>
      </div>
    </section>

    <div id="errorMsg" class="error-msg" style="display:none"></div>
    <div id="resultsContainer" class="results-container"></div>

    <!-- 抖音同步 -->
    <section class="card" id="syncSection">
      <div class="card-header">
        <span class="card-title">抖音同步</span>
        <span class="badge" id="syncBadge" style="display:none"><span class="badge-dot"></span><span id="syncBadgeText">已登录</span></span>
        <div class="card-actions">
          <button class="btn btn--ghost-sm" id="syncAccountBtn" onclick="handleFavAccount()"><span id="favAccountBtnText">登录</span></button>
        </div>
      </div>

      <div class="sync-tabs">
        <button class="sync-tab active" data-tab="fav" onclick="switchSyncTab('fav')">收藏</button>
        <button class="sync-tab" data-tab="liked" onclick="switchSyncTab('liked')">喜欢</button>
        <button class="sync-tab" data-tab="schedule" onclick="switchSyncTab('schedule')">定时</button>
        <button class="sync-tab" data-tab="auth" onclick="switchSyncTab('auth')">凭证</button>
      </div>

      <!-- Tab: 收藏 -->
      <div class="sync-tab-content active" id="tabFav">
        <div class="sync-toolbar">
          <label class="field-inline"><span>最近</span><input type="number" id="favMaxCount" value="50" min="1" max="500"><span>条</span></label>
          <button class="btn btn--primary btn--sm" id="favSyncBtn" onclick="handleFavoritesSync()" disabled>同步收藏</button>
        </div>
        <div id="favSyncPanel" class="sync-panel" style="display:none"></div>
      </div>

      <!-- Tab: 喜欢 -->
      <div class="sync-tab-content" id="tabLiked">
        <div class="sync-toolbar">
          <label class="field-inline"><span>最近</span><input type="number" id="likedMaxCount" value="50" min="1" max="500"><span>条</span></label>
          <button class="btn btn--primary btn--sm" id="likedSyncBtn" onclick="handleLikedSync()" disabled>同步喜欢</button>
        </div>
        <div id="likedSyncPanel" class="sync-panel" style="display:none"></div>
      </div>

      <!-- Tab: 定时 -->
      <div class="sync-tab-content" id="tabSchedule">
        <div class="schedule-form">
          <div class="form-row"><label>启用</label><label class="switch"><input type="checkbox" id="scheduleEnabled" onchange="saveScheduleConfig()"><span class="slider"></span></label></div>
          <div class="form-row"><label>触发模式</label>
            <select id="scheduleTriggerMode" onchange="onTriggerModeChange()" class="form-select">
              <option value="fixed">固定时间</option>
              <option value="random">随机时段（防风控）</option>
            </select>
          </div>
          <div class="form-row" id="scheduleFixedRow"><label>执行时间</label><input type="time" id="scheduleTime" value="00:00" onchange="saveScheduleConfig()" class="form-input form-input--time"></div>
          <div class="form-row" id="scheduleRandomRow" style="display:none;"><label>随机区间</label>
            <div class="time-range"><input type="time" id="scheduleRangeStart" value="00:00" onchange="saveScheduleConfig()" class="form-input form-input--time"><span>—</span><input type="time" id="scheduleRangeEnd" value="06:00" onchange="saveScheduleConfig()" class="form-input form-input--time"></div>
          </div>
          <div class="form-row"><label>同步内容</label>
            <select id="scheduleSyncMode" onchange="saveScheduleConfig()" class="form-select">
              <option value="both">收藏 + 喜欢（去重）</option>
              <option value="favorites">仅收藏</option>
              <option value="liked">仅喜欢</option>
            </select>
          </div>
          <div class="form-row"><label>最大条数</label><input type="number" id="scheduleMaxCount" value="50" min="1" max="500" onchange="saveScheduleConfig()" class="form-input" style="width:72px;"></div>
          <div class="form-actions">
            <button class="btn btn--primary btn--sm" onclick="triggerScheduleNow()">立即执行</button>
            <button class="btn btn--ghost-sm" onclick="loadScheduleLogs()">日志</button>
          </div>
          <div id="scheduleLogPanel" class="schedule-log" style="display:none;"></div>
        </div>
      </div>

      <!-- Tab: 凭证 -->
      <div class="sync-tab-content" id="tabAuth">
        <div class="auth-form">
          <p class="auth-hint">粘贴抖音 <code>sessionid</code> Cookie 完成登录绑定</p>
          <input type="text" id="cookieInput" class="form-input" placeholder="sessionid 值…" autocomplete="off" spellcheck="false">
          <button id="cookieSubmitBtn" class="btn btn--primary btn--sm" onclick="handleCookieSubmit()" style="width:100%;margin-top:10px;">绑定凭证</button>
          <details class="auth-help">
            <summary>如何获取？</summary>
            <ol>
              <li>浏览器打开 <a href="https://www.douyin.com" target="_blank">douyin.com</a> 并登录</li>
              <li>F12 → Application → Cookies</li>
              <li>复制 <code>sessionid</code> 值粘贴到上方</li>
            </ol>
          </details>
        </div>
      </div>
    </section>

    <!-- 下载历史 -->
    <section class="card" id="historySection" style="display:none">
      <div class="card-header">
        <span class="card-title">下载历史</span>
        <button class="btn btn--ghost-sm" onclick="clearHistory()">清空</button>
      </div>
      <div class="history-filters" id="historyFilters" style="display:none;">
        <input type="text" id="historyFilterKeyword" placeholder="搜索…" oninput="applyHistoryFilter()" class="form-input form-input--sm">
        <select id="historyFilterAuthor" onchange="applyHistoryFilter()" class="form-select form-select--sm"><option value="">全部作者</option></select>
        <select id="historyFilterDate" onchange="applyHistoryFilter()" class="form-select form-select--sm">
          <option value="">全部时间</option><option value="today">今天</option><option value="week">7天</option><option value="month">30天</option>
        </select>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>

    <!-- 设置 -->
    <section class="card">
      <div class="card-header" onclick="toggleSettings()" style="cursor:pointer;">
        <span class="card-title">设置</span>
        <svg class="chevron" id="settingsChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div id="settingsPanel" style="display:none;padding:0 20px 20px;">
        <div class="form-row">
          <label>下载目录</label>
          <div style="display:flex;gap:8px;flex:1;">
            <input type="text" id="downloadDir" class="form-input" placeholder="默认 ~/Downloads/douyin" style="flex:1;">
            <button class="btn btn--primary btn--sm" onclick="saveConfig()">保存</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer"><p>仅供个人学习研究使用</p></footer>
  <script src="app.js?v=20260430"></script>
</body>
</html>
